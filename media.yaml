# media.yaml — curated free supplementary media per domain (EXP-029).
#
# Optional companion to the lesson catalogue and to books.yaml: maps a
# content domain to a list of free, openly accessible media (videos,
# podcasts, articles) the app can surface as further study material.
#
# Like books.yaml, this file is NOT a content set and is not processed by
# scripts/validate_content.py for the lesson schema. It only has to be
# valid YAML.
#
# Curation rules (EXP-029):
#   - Free media only (paid material belongs in books.yaml).
#   - No affiliate links, no tracking parameters.
#   - No paywalled courses.
#   - Every url is a real, working http/https link (validated).
#   - language: de or en (the language of the resource).
#   - level: beginner | intermediate | advanced, where meaningful.
#   - type: youtube | podcast | article | book.
#         ``book`` surfaces the companion book of a set as the first
#         "further study" item; the canonical book record still lives
#         in books.yaml.
#   - set: optional set id an entry is tied to (e.g. ``it-grundlagen-from-de``).
#   - priority: lower sorts first. The companion ``book`` of a set uses
#         ``priority: 0`` so it appears before all videos and links;
#         every other entry defaults to ``priority: 10``.

technology:
  - title: "The Morpheus Tutorials — Programmieren lernen"
    type: youtube
    set: it-grundlagen-from-de
    url: "https://www.youtube.com/@TheMorpheusTutorials"
    language: de
    level: beginner
    description: >-
      Umfangreicher deutschsprachiger Kanal zu Programmierung und
      Informatik-Grundlagen (Variablen, Kontrollstrukturen,
      Datenbanken, Git, Web) — passend zum IT-Grundlagen-Set.
  - title: "Crash Course Computer Science"
    type: youtube
    url: "https://www.youtube.com/playlist?list=PL8dPuuaLjXtNlUrzyH5r6jN9ulIgZBpdo"
    language: en
    level: beginner
    description: >-
      Englische 40-teilige Reihe zu den Grundlagen der Informatik:
      von Hardware und Betriebssystemen über Netzwerke bis zu
      Sicherheit — eine gute visuelle Ergänzung.
  - title: "Informatik (Wikipedia)"
    type: article
    url: "https://de.wikipedia.org/wiki/Informatik"
    language: de
    level: beginner
    description: >-
      Deutschsprachiger Überblick über die Informatik und ihre
      Teilgebiete — Kontext zum IT-Grundlagen-Set.
  - title: "Ansible for Beginners — Full Course"
    type: youtube
    set: ansible-qe-from-de
    url: "https://www.youtube.com/watch?v=3RiVKs8GHYQ"
    language: en
    level: intermediate
    description: >-
      Einsteigerfreundliches Komplett-Tutorial zu Ansible (freeCodeCamp):
      Inventory, Playbooks, Module, Variablen und Templates — gute
      Ergänzung zum Ansible-QE-Set, besonders zu den Lektionen 1, 2 und 8.
